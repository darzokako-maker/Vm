name: Build Blink EXE

on:
  push:
    branches: [ "main", "master" ] # main veya master branch'ine kod yüklendiğinde tetiklenir
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # İstediğin zaman GitHub arayüzünden elle de başlatabilmen için

jobs:
  build:
    runs-on: windows-latest # Windows üzerinde derleme yapıyoruz ki Windows uyumlu EXE versin

    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v4

    - name: Python Kurulumu
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # Kararlı bir Python sürümü

    - name: Gerekli Kütüphaneleri Yükle
      run: |
        python -m pip install --upgrade pip
        pip install keyboard pyinstaller

    - name: PyInstaller ile EXE'ye Dönüştür
      run: |
        # --onefile: Tek bir bağımsız .exe dosyası üretir.
        # --noconsole: Arka planda siyah CMD ekranı açılmasını engeller (isteğe bağlıdır, 
        # eğer print çıktılarını görmek istiyorsan bu parametreyi silebilirsin).
        # --uac-admin: Programın otomatik olarak "Yönetici Olarak Çalıştır" yetkisi istemesini sağlar (bu betik için şarttır).
        pyinstaller --onefile --uac-admin main.py

    - name: Oluşturulan EXE'yi GitHub'a Yükle (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: Minecraft-Blink-EXE
        path: dist/main.exe
        
